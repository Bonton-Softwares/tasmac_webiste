<div class="org-page">
    <!-- Header -->
    <div class="page-header">
        <h1>
            Organisation Structure
        </h1>
        <p>
            Tamil Nadu State Marketing Corporation Limited
        </p>
    </div>
    <!-- Board of Directors -->
    <div class="org-card">
        <div class="section-header">
            <i class="fa fa-users"></i>
            <span>Board Of Directors</span>
        </div>
        <div class="chart-wrapper">
            <p-organizationChart [value]="boardOfDirector">
            </p-organizationChart>
        </div>
    </div>
    <!-- TASMAC Structure -->
    <div class="org-card mt-4">
        <div class="section-header">
            <i class="fa fa-sitemap"></i>
            <span>TASMAC Organisation Structure</span>
        </div>
        <div class="chart-wrapper">
            <p-organizationChart [value]="tasmacOrganisatinStructure">
           </p-organizationChart>
        </div>
    </div>
    <!-- Corporate Structure -->
    <div class="org-card mt-4">
        <div class="section-header">
            <i class="fa fa-building"></i>
            <span>Corporate Organisation Structure</span>
        </div>
        <div class="chart-wrapper">
            <p-organizationChart [value]="corporateOrganisatinStructure">
            </p-organizationChart>
        </div>
    </div>
</div>
