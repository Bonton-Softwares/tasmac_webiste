<app-loader></app-loader>

<div class="shop-page">

  <div class="container-fluid">

    <div class="page-header">
      <h1>SHOP LOCATOR</h1>
      <p>Find nearby TASMAC RV Shops easily using Google Maps</p>
    </div>

    <div class="row g-4">

      <!-- FILTER SECTION -->
      <div class="col-lg-4">

        <div class="filter-card">

          <div class="filter-title">
            <i class="bi bi-geo-alt-fill"></i>
            Search Shops
          </div>

          <div class="filter-group">
            <label>RV Shop Number</label>

            <p-dropdown [filter]="true" appendTo="body" [options]="rvShopNos" optionLabel="RVShopsNo"
              optionValue="RVShopsNo" dropdownIcon="pi pi-angle-down" [style]="{'width':'100%'}"
              [(ngModel)]="selectedRvShopNo" (onChange)="getRvShopDetails()">
            </p-dropdown>
          </div>

          <div class="filter-group">
            <label>District</label>

            <p-dropdown [filter]="true" appendTo="body" [options]="districts" optionLabel="revenue_district_name"
              optionValue="revenue_district_id" dropdownIcon="pi pi-angle-down" [style]="{'width':'100%'}"
              (onChange)="filterRvAndTaluk()" [(ngModel)]="selectedDistrict">
            </p-dropdown>
          </div>

          <div class="filter-group">
            <label>Taluk</label>

            <p-dropdown [filter]="true" appendTo="body" [options]="taluks" optionLabel="taluk" optionValue="taluk_code"
              dropdownIcon="pi pi-angle-down" [style]="{'width':'100%'}" [(ngModel)]="selectedTaluk"
              (onChange)="filterRV()">
            </p-dropdown>
          </div>

          <button class="reset-btn" (click)="resetFilters()">
            <i class="bi bi-arrow-clockwise"></i>
            Reset Filters
          </button>

        </div>

      </div>

      <!-- MAP SECTION -->
      <div class="col-lg-8">

        <div class="map-card">

          <div class="map-header">
            <h3>Google Map View</h3>
          </div>

          <div class="map-wrapper">

            <iframe [src]="mapUrl" width="100%" height="550" style="border:0;border-radius:18px;" loading="lazy"
              allowfullscreen>

            </iframe>

        </div>

      </div>

    </div>

  </div>

  <!-- TABLE -->
  <div class="shop-table-card mt-4">

    <div class="table-header">
      <h3>RV Shop Details</h3>
      <span>Total Shops : {{ filteredShops.length }}</span>
    </div>

    <div class="table-responsive">

      <table class="table custom-table">

        <thead>
          <tr>
            <th>S.No</th>
            <th>RV Shop No</th>
            <th>Address</th>
            <th>Direction</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let shop of filteredShops; let i=index">

            <td>{{ i + 1 }}</td>

            <td>
              <span class="shop-badge">
                {{ shop.RVShopsNo }}
              </span>
            </td>

            <td>{{ shop.Address }}</td>

            <td>

              <button class="direction-btn" (click)="navigate(shop.latitude,shop.longitude)">

                <i class="bi bi-map"></i>
                View Map

              </button>

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>

</div>

<div class="scroll-top" [ngClass]="{'show-scroll': isShow}" (click)="scrollToTop()">

  <i class="bi bi-arrow-up"></i>

</div>
